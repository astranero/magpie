name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install (workspace root)
        run: npm ci
      - name: Unit tests
        run: npm test -w apps/extension
      - name: Build
        run: npm run build -w apps/extension
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        run: npm run test:e2e -w apps/extension
        env:
          CI: "true"
